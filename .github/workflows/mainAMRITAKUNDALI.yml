name: Amritakundali - Firmware Modulos M01-M12 (10^999)

on: [workflow_dispatch]

jobs:
  compilacion_firmware_avanzado:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { m: "M01", n: "Amritakundali Aveshaya", f: "1000 Amritakundali Aveshaya.pdf" }
          - { m: "M02", n: "Amritakundali Hridaya", f: "1000 Amritakundali Hridaya.pdf" }
          - { m: "M03", n: "Amritakundali Krodharaja", f: "1000 Amritakundali Krodharaja.pdf" }
          - { m: "M04", n: "Amritakundali Marana-Niyama", f: "1000 Amritakundali Marana-Niyama.pdf" }
          - { m: "M05", n: "Amritakundali Pushti-Niyama", f: "1000 Amritakundali Pushti-Niyama.pdf" }
          - { m: "M06", n: "Amritakundali Shanti-Niyama", f: "1000 Amritakundali Shanti-Niyama.pdf" }
          - { m: "M07", n: "Amritakundali Siddhi-Vardhana", f: "1000 Amritakundali Siddhi-Vardhana.pdf" }
          - { m: "M08", n: "Amritakundali Spharana-Samhara", f: "1000 Amritakundali Spharana-Samhara.pdf" }
          - { m: "M09", n: "Amritakundali Vaishravanaya", f: "1000 Amritakundali Vaishravanaya.pdf" }
          - { m: "M10", n: "Amritakundali Vajracharya-Abhisheka", f: "1000 Amritakundali Vajracharya-Abhisheka.pdf" }
          - { m: "M11", n: "Amritakundali Vasham-Niyama", f: "1000 Amritakundali Vasham-Niyama.pdf" }
          - { m: "M12", n: "Amritakundali Vighnantaka", f: "1000 Amritakundali Vighnantaka.pdf" }

    steps:
      - name: 1. Acceso al Repositorio
        uses: actions/checkout@v4

      - name: 2. Setup de Herramientas de Compresión
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: 3. Localización y Verificación de la Semilla
        id: locate
        run: |
          FILE_PATH=$(find . -maxdepth 1 -iname "${{ matrix.f }}" -print -quit)
          if [ -z "$FILE_PATH" ]; then
            echo "❌ ERROR: Archivo semilla '${{ matrix.f }}' no encontrado."
            exit 1
          fi
          7z a -t7z "current.7z" "$FILE_PATH" -mx=9 -ms=on > /dev/null

      - name: 4. Motor de Expansión Fractal (333 Ciclos)
        run: |
          set -e
          cat << 'EOF' > cloner.py
          import os
          os.makedirs("buffer", exist_ok=True)
          for i in range(1, 1001):
              os.link("current.7z", f"buffer/node_{i}.7z")
          EOF

          for step in $(seq 1 333)
          do
            echo ">>> [FIRMWARE KERNEL] ${{ matrix.m }} - ${{ matrix.n }} | Ciclo $step/333"
            python3 cloner.py
            cd buffer
            7z a -t7z "../next.7z" . -mx=9 -ms=on -m0=lzma2 -mmt=2 -bso0 -bsp0
            cd ..
            rm -rf buffer && rm "current.7z" && mv "next.7z" "current.7z"
          done
          
          mv "current.7z" "${{ matrix.m }} 10^999 ${{ matrix.n }}.7z"

      - name: 5. Sellado y Carga del Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Firmware_${{ matrix.m }}_${{ matrix.n }}
          path: "${{ matrix.m }} 10^999 ${{ matrix.n }}.7z"
