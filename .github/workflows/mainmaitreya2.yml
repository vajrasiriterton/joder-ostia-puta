name: Maitreya - Firmware Modulos M17-M31 (10^999)

on: [workflow_dispatch]

jobs:
  compilacion_firmware_avanzado:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { m: "M17", n: "Maitreya Simhanada", f: "1000 Maitreya Simhanada.pdf" }
          - { m: "M18", n: "Maitreya Tathagatagarbha", f: "1000 Maitreya Tathagatagarbha.pdf" }
          - { m: "M19", n: "Maitreya Trilokyavijaya", f: "1000 Maitreya Trilokyavijaya.pdf" }
          - { m: "M20", n: "Maitreya Yab-Yum", f: "1000 Maitreya Yab-Yum.pdf" }
          - { m: "M21", n: "Maitreya Zhitro", f: "1000 Maitreya Zhitro.pdf" }
          - { m: "M22", n: "Mayajala Maitreya", f: "1000 Mayajala Maitreya.pdf" }
          - { m: "M23", n: "Padma Maitreya", f: "1000 Padma Maitreya.pdf" }
          - { m: "M24", n: "Prana Maitreya", f: "1000 Prana Maitreya.pdf" }
          - { m: "M25", n: "Ratna Maitreya", f: "1000 Ratna Maitreya.pdf" }
          - { m: "M26", n: "Silent form Maitreya", f: "1000 Silent form Maitreya.pdf" }
          - { m: "M27", n: "Supreme Bodhicitta", f: "1000 Supreme Bodhicitta.pdf" }
          - { m: "M28", n: "Upahridaya", f: "1000 Upahridaya.pdf" }
          - { m: "M29", n: "Vairochana-Maitreya", f: "1000 Vairochana-Maitreya.pdf" }
          - { m: "M30", n: "Vajra Maitreya", f: "1000 Vajra Maitreya.pdf" }
          - { m: "M31", n: "Vajra-Maitreya", f: "1000 Vajra-Maitreya.pdf" }

    steps:
      - name: 1. Acceso al Repositorio
        uses: actions/checkout@v4

      - name: 2. Setup de Herramientas de Compresión
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: 3. Localización y Verificación de la Semilla
        id: locate
        run: |
          FILE_PATH=$(find . -maxdepth 1 -iname "${{ matrix.f }}" -print -quit)
          if [ -z "$FILE_PATH" ]; then
            echo "❌ ERROR: Archivo semilla '${{ matrix.f }}' no encontrado."
            exit 1
          fi
          7z a -t7z "current.7z" "$FILE_PATH" -mx=9 -ms=on > /dev/null

      - name: 4. Motor de Expansión Fractal (333 Ciclos)
        run: |
          set -e
          cat << 'EOF' > cloner.py
          import os
          os.makedirs("buffer", exist_ok=True)
          for i in range(1, 1001):
              os.link("current.7z", f"buffer/node_{i}.7z")
          EOF

          for step in $(seq 1 333)
          do
            echo ">>> [FIRMWARE KERNEL] ${{ matrix.m }} - ${{ matrix.n }} | Ciclo $step/333"
            python3 cloner.py
            cd buffer
            7z a -t7z "../next.7z" . -mx=9 -ms=on -m0=lzma2 -mmt=2 -bso0 -bsp0
            cd ..
            rm -rf buffer && rm "current.7z" && mv "next.7z" "current.7z"
          done
          
          mv "current.7z" "${{ matrix.m }} 10^999 ${{ matrix.n }}.7z"

      - name: 5. Sellado y Carga del Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Firmware_${{ matrix.m }}_${{ matrix.n }}
          path: "${{ matrix.m }} 10^999 ${{ matrix.n }}.7z"
