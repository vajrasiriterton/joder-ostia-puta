name: Amritayana - Gurus Tanda 1 (Linajes)

on: [workflow_dispatch]

jobs:
  ascensao_fractal:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { n: "25 Disciples", f: "1000 25 Disciples.pdf", e: "Nyingma", b: 3, s: 332 }
          - { n: "Dudjom Lingpa", f: "1000 Dudjom Lingpa.pdf", e: "Nyingma", b: 3, s: 332 }
          - { n: "Garab Dorje", f: "1000 Garab Dorje.pdf", e: "Nyingma", b: 3, s: 332 }
          - { n: "Jigme Lingpa", f: "1000 Jigme Lingpapdf.pdf", e: "Nyingma", b: 3, s: 332 }
          - { n: "Longchenpa", f: "1000 Longchenpapdf.pdf", e: "Nyingma", b: 3, s: 332 }
          - { n: "Nyangral Nyima Ozer", f: "1000 Nyangral Nyima Özer & Guru Chöwang.pdf", e: "Nyingma", b: 3, s: 332 }
          - { n: "Vimalamitra", f: "1000 Vimalamitra.pdf", e: "Nyingma", b: 3, s: 332 }
          - { n: "Gampopa", f: "1000 Gampopa.pdf", e: "Kagyu", b: 3, s: 332 }
          - { n: "Karmapa", f: "1000 Karmapa.pdf", e: "Kagyu", b: 3, s: 332 }
          - { n: "Marpa", f: "1000 Marpa.pdf", e: "Kagyu", b: 3, s: 332 }
          - { n: "Milarepa", f: "1000 Milarepa.pdf", e: "Kagyu", b: 3, s: 332 }
          - { n: "Naropa", f: "1000 Naropa.pdf", e: "Kagyu", b: 3, s: 332 }
          - { n: "Tilopa", f: "1000 Tilopa.pdf", e: "Kagyu", b: 3, s: 332 }
          - { n: "Sachen Kunga Nyingpo", f: "1000 Sachen Kunga Nyingpo.pdf", e: "Sakya", b: 3, s: 332 }
          - { n: "Sakya Pandita", f: "1000 Sakya Pandita.pdf", e: "Sakya", b: 3, s: 332 }
          - { n: "Je Tsongkhapa", f: "1000 Je Tsongkhapa.pdf", e: "Gelug", b: 3, s: 332 }

    steps:
      - name: 1. Acesso ao Repositório Amritayana
        uses: actions/checkout@v4

      - name: 2. Setup de Ferramentas
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: 3. Localização de Semilla
        id: locate
        run: |
          FILE_PATH=$(find . -maxdepth 1 -iname "${{ matrix.f }}" -print -quit)
          if [ -z "$FILE_PATH" ]; then
            echo "❌ Archivo semilla no encontrado."
            exit 1
          fi
          7z a -t7z "current.7z" "$FILE_PATH" -mx=9 -ms=on > /dev/null

      - name: 4. Motor de Expansão 10^999
        run: |
          set -e
          cat << 'EOF' > cloner.py
          import os
          os.makedirs("buffer", exist_ok=True)
          for i in range(1, 1001):
              os.link("current.7z", f"buffer/node_{i}.7z")
          EOF

          for step in $(seq 1 ${{ matrix.s }})
          do
            EXP=$(( ${{ matrix.b }} + step * 3 ))
            echo ">>> [AMRITAYANA] ${{ matrix.n }} | Ciclo $step/${{ matrix.s }} | Potencia: 10^$EXP"
            python3 cloner.py
            cd buffer
            7z a -t7z "../next.7z" . -mx=9 -ms=on -m0=lzma2 -mmt=2 -bso0 -bsp0
            cd ..
            rm -rf buffer && rm "current.7z" && mv "next.7z" "current.7z"
          done
          mv "current.7z" "10^999 ${{ matrix.e }} ${{ matrix.n }}.7z"

      - name: 5. Armazenamento
        uses: actions/upload-artifact@v4
        with:
          name: Ascension_999_${{ matrix.n }}
          path: "10^999 ${{ matrix.e }} ${{ matrix.n }}.7z"
