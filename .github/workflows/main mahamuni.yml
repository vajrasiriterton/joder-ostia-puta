name: Amritayana - Sakyamuni 10^999

on: [workflow_dispatch]

jobs:
  ascensao_fractal:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { n: "Sakyamuni", f: "10000 Sakyamuni.pdf", e: "Especial", b: 6, s: 331 }

    steps:
      - name: 1. Acesso ao Repositório Amritayana
        uses: actions/checkout@v4

      - name: 2. Setup de Ferramentas de Alta Densidade
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: 3. Calibração Inicial da Semente (10^4 -> 10^6)
        run: |
          FILE_PATH=$(find . -maxdepth 1 -iname "${{ matrix.f }}" -print -quit)
          if [ -z "$FILE_PATH" ]; then
            echo "❌ ERRO: Arquivo semente '${{ matrix.f }}' não encontrado."
            exit 1
          fi
          
          # Semente é 10^4. Expandimos x100 (10^2) no primeiro bloco para cravar a base matemática em 10^6
          mkdir -p initial_buffer
          for i in $(seq 1 100); do
            ln "$FILE_PATH" "initial_buffer/node_${i}.pdf"
          done
          
          7z a -t7z "current.7z" ./initial_buffer/* -mx=9 -ms=on > /dev/null
          rm -rf initial_buffer

      - name: 4. Motor de Expansão para 10^999
        run: |
          set -e
          cat << 'EOF' > cloner.py
          import os
          os.makedirs("buffer", exist_ok=True)
          for i in range(1, 1001):
              os.link("current.7z", f"buffer/node_{i}.7z")
          EOF

          for step in $(seq 1 ${{ matrix.s }})
          do
            EXP=$(( ${{ matrix.b }} + step * 3 ))
            echo ">>> [AMRITAYANA] ${{ matrix.n }} | Ciclo $step/${{ matrix.s }} | Potência: 10^$EXP"
            
            python3 cloner.py
            
            cd buffer
            7z a -t7z "../next.7z" . -mx=9 -ms=on -m0=lzma2 -mmt=2 -bso0 -bsp0
            cd ..
            
            rm -rf buffer
            rm "current.7z"
            mv "next.7z" "current.7z"
          done
          
          mv "current.7z" "10^999 ${{ matrix.e }} ${{ matrix.n }}.7z"

          # Limpeza do script auxiliar
          rm cloner.py

      - name: 5. Armazenamento de Artefatos
        uses: actions/upload-artifact@v4
        with:
          name: Ascension_999_${{ matrix.n }}
          path: "10^999 ${{ matrix.e }} ${{ matrix.n }}.7z"
          retention-days: 5
