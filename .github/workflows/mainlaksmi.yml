name: Amritayana Foundation - Lakshmi 10^999

on: [workflow_dispatch]

jobs:
  ascensao_fractal:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { n: "Kichijoten", f: "1000 Kichijoten.pdf", b: 3, s: 332 }
          - { n: "Mahasri Laksmi", f: "1000 Mahasri Laksmi.pdf", b: 3, s: 332 }
          - { n: "Nor-zang-ma", f: "1000 Nor-zang-ma.pdf", b: 3, s: 332 }
          - { n: "Sri Mahadevi", f: "1000 Sri Mahadevi.pdf", b: 3, s: 332 }
          - { n: "Vajra Laksmi", f: "1000 Vajra Laksmi.pdf", b: 3, s: 332 }
          - { n: "Vasudhara", f: "1000 Vasudhara.pdf", b: 3, s: 332 }

    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y p7zip-full
      - run: |
          FILE_PATH=$(find . -maxdepth 1 -iname "${{ matrix.f }}" -print -quit)
          if [ -z "$FILE_PATH" ]; then exit 1; fi
          7z a -t7z "current.7z" "$FILE_PATH" -mx=9 -ms=on > /dev/null
      - run: |
          set -e
          cat << 'EOF' > cloner.py
          import os
          os.makedirs("buffer", exist_ok=True)
          for i in range(1, 1001):
              os.link("current.7z", f"buffer/node_{i}.7z")
          EOF
          for step in $(seq 1 ${{ matrix.s }}); do
            EXP=$(( ${{ matrix.b }} + step * 3 ))
            echo ">>> [AMRITAYANA] ${{ matrix.n }} | Ciclo $step/${{ matrix.s }} | Potência: 10^$EXP"
            python3 cloner.py
            cd buffer && 7z a -t7z "../next.7z" . -mx=9 -ms=on -m0=lzma2 -mmt=2 -bso0 -bsp0 && cd ..
            rm -rf buffer && rm current.7z && mv next.7z current.7z
          done
          mv current.7z "10^999 ${{ matrix.n }} Supreme Ascension.7z"
      - uses: actions/upload-artifact@v4
        with:
          name: Ascension_999_${{ matrix.n }}
          path: "*.7z"
          retention-days: 5
