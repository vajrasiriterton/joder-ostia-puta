name: Amritayana Foundation - Ganpati Alfa 10^999

on: [workflow_dispatch]

jobs:
  ascensao_fractal:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { n: "Haridra Ganapati", f: "1000 Haridra Ganapati.pdf", b: 3, s: 332 }
          - { n: "Kshipra Prasada Ganapati", f: "1000 Kshipra Prasada Ganapati.pdf", b: 3, s: 332 }
          - { n: "Maharakta Ganapati", f: "1000 Maharakta Ganapati.pdf", b: 3, s: 332 }
          - { n: "Nṛtta Ganapati", f: "1000 Nṛtta Ganapati.pdf", b: 3, s: 332 }
          - { n: "Om Ganapati Hung Phat", f: "1000 Om Ganapati Hung Phat.pdf", b: 3, s: 332 }
          - { n: "Ragavajra Ganapati", f: "1000 Ragavajra Ganapati.pdf", b: 3, s: 332 }

    steps:
      - name: 1. Acesso ao Repositório Amritayana
        uses: actions/checkout@v4

      - name: 2. Setup de Ferramentas
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: 3. Localização de Semilla
        id: locate
        run: |
          FILE_PATH=$(find . -maxdepth 1 -iname "${{ matrix.f }}" -print -quit)
          if [ -z "$FILE_PATH" ]; then exit 1; fi
          # Compresión Ultra al inicio
          7z a -t7z "current.7z" "$FILE_PATH" -mx=9 -ms=on > /dev/null

      - name: 4. Motor de Expansão 10^999 (Máxima Compresión)
        run: |
          set -e
          DEIDADE="${{ matrix.n }}"
          FINAL="10^999 ${DEIDADE} Supreme Ascension.7z"
          
          cat << 'EOF' > cloner.py
          import os, sys
          os.makedirs("buffer", exist_ok=True)
          for i in range(1, 1001):
              os.link("current.7z", f"buffer/node_{i}.7z")
          EOF

          for step in $(seq 1 ${{ matrix.s }})
          do
            EXP=$(( ${{ matrix.b }} + step * 3 ))
            echo ">>> [AMRITAYANA] $DEIDADE | Ciclo $step/${{ matrix.s }} | Potência: 10^$EXP"
            
            python3 cloner.py
            
            cd buffer
            # Ultra Compresión (-mx=9), Sólido (-ms=on) y sin bloqueo de logs (-bso0 -bsp0)
            7z a -t7z "../next.7z" . -mx=9 -ms=on -m0=lzma2 -mmt=2 -bso0 -bsp0
            cd ..
            
            rm -rf buffer
            rm "current.7z"
            mv "next.7z" "current.7z"
          done
          
          mv "current.7z" "$FINAL"

      - name: 5. Armazenamento
        uses: actions/upload-artifact@v4
        with:
          name: Ascension_999_${{ matrix.n }}
          path: "10^999 ${{ matrix.n }} Supreme Ascension.7z"
          retention-days: 5
