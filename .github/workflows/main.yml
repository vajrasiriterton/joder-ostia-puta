name: Amritayana Foundation - Ganpati Alfa 10^333

on: [workflow_dispatch]

jobs:
  ascensao_fractal:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { n: "Haridra Ganapati", f: "1000 Haridra Ganapati.pdf", b: 3, s: 110 }
          - { n: "Kshipra Prasada Ganapati", f: "1000 Kshipra Prasada Ganapati.pdf", b: 3, s: 110 }
          - { n: "Maharakta Ganapati", f: "1000 Maharakta Ganapati.pdf", b: 3, s: 110 }
          - { n: "Nṛtta Ganapati", f: "1000 Nṛtta Ganapati.pdf", b: 3, s: 110 }
          - { n: "Om Ganapati Hung Phat", f: "1000 Om Ganapati Hung Phat.pdf", b: 3, s: 110 }
          - { n: "Ragavajra Ganapati", f: "1000 Ragavajra Ganapati.pdf", b: 3, s: 110 }

    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y p7zip-full
      - id: locate
        run: |
          FILE_PATH=$(find . -maxdepth 1 -iname "${{ matrix.f }}" -print -quit)
          7z a -t7z "current.7z" "$FILE_PATH" -mx=1 -ms=on > /dev/null
      - run: |
          set -e
          cat << 'EOF' > cloner.py
          import os, sys
          name, exp, clones = sys.argv[1], sys.argv[2], int(sys.argv[3])
          os.makedirs("buffer", exist_ok=True)
          for i in range(1, clones + 1):
              fname = f"10^{exp} {name} _node_{i}.7z"
              os.link("current.7z", f"buffer/{fname}")
          EOF
          for step in $(seq 1 ${{ matrix.s }}); do
            EXP=$(( ${{ matrix.b }} + step * 3 ))
            echo ">>> [AMRITAYANA] ${{ matrix.n }} | Ciclo $step/110 | 10^$EXP"
            python3 cloner.py "${{ matrix.n }}" "$EXP" 1000
            cd buffer && 7z a -t7z "../next.7z" . -mx=1 -ms=on -mmt=on -bd > /dev/null && cd ..
            rm -rf buffer && rm "current.7z" && mv "next.7z" "current.7z"
          done
          mv "current.7z" "10^333 ${{ matrix.n }} Supreme Ascension.7z"
      - uses: actions/upload-artifact@v4
        with:
          name: Ascension_333_${{ matrix.n }}
          path: "*.7z"
