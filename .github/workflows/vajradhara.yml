name: Amritayana - Vajradhara (Nivel TOTAL)

on: [workflow_dispatch]

jobs:
  ascensao_fractal:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Acesso ao Repositório Amritayana
        uses: actions/checkout@v4

      - name: 2. Setup de Ferramentas
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: 3. Localização de Semilla (Vajradhara)
        id: locate
        run: |
          FILE_PATH=$(find . -maxdepth 1 -iname "1000 Vajradhara.pdf" -print -quit)
          if [ -z "$FILE_PATH" ]; then
            echo "❌ Archivo semilla '1000 Vajradhara.pdf' no encontrado."
            exit 1
          fi
          # Empaquetado inicial (10^3)
          7z a -t7z "current.7z" "$FILE_PATH" -mx=9 -ms=on > /dev/null

      - name: 4. Motor de Expansão para 10^999 (Nivel Total)
        run: |
          set -e
          # Estructura: 10^3 + (332 ciclos * 3) = 10^999
          cat << 'EOF' > cloner.py
          import os
          os.makedirs("buffer", exist_ok=True)
          for i in range(1, 1001):
              os.link("current.7z", f"buffer/node_{i}.7z")
          EOF

          for step in $(seq 1 332)
          do
            echo ">>> [AMRITAYANA] Vajradhara | Nivel TOTAL | Ciclo $step/332 | Exp: 10^$((3 + step * 3))"
            python3 cloner.py
            cd buffer
            7z a -t7z "../next.7z" . -mx=9 -ms=on -m0=lzma2 -mmt=2 -bso0 -bsp0
            cd ..
            rm -rf buffer && rm "current.7z" && mv "next.7z" "current.7z"
          done
          
          mv "current.7z" "10^999 TOTAL Vajradhara.7z"

      - name: 5. Armazenamento do Ápice
        uses: actions/upload-artifact@v4
        with:
          name: Ascension_999_Vajradhara_TOTAL
          path: "10^999 TOTAL Vajradhara.7z"
          retention-days: 7
