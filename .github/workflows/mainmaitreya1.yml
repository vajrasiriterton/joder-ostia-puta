name: Maitreya - Firmware Modulos M01-M16 (10^999)

on: [workflow_dispatch]

jobs:
  compilacion_firmware_avanzado:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { m: "M01", n: "Ajita Maitreya", f: "1000 Ajita Maitreya.pdf" }
          - { m: "M02", n: "Kalachakra Maitreya", f: "1000 Kalachakra Maitreya.pdf" }
          - { m: "M03", n: "Karma Maitreya", f: "1000 Karma Maitreya.pdf" }
          - { m: "M04", n: "Krishna Yamari", f: "1000 Krishna Yamari.pdf" }
          - { m: "M05", n: "Maitreya Buddha Heart", f: "1000 Maitreya Buddha Heart.pdf" }
          - { m: "M06", n: "Maitreya Chitta-Asanga", f: "1000 Maitreya Chitta-Asanga.pdf" }
          - { m: "M07", n: "Maitreya Dakini-Raja", f: "1000 Maitreya Dakini-Raja.pdf" }
          - { m: "M08", n: "Maitreya Dharmasharira", f: "1000 Maitreya Dharmasharira.pdf" }
          - { m: "M09", n: "Maitreya Dzambhala", f: "1000 Maitreya Dzambhala.pdf" }
          - { m: "M10", n: "Maitreya Jnanasattva", f: "1000 Maitreya Jnanasattva.pdf" }
          - { m: "M11", n: "Maitreya Krodha", f: "1000 Maitreya Krodha.pdf" }
          - { m: "M12", n: "Maitreya Long Dharani", f: "1000 Maitreya Long Dharani.pdf" }
          - { m: "M13", n: "Maitreya Nirvanam", f: "1000 Maitreya Nirvanam.pdf" }
          - { m: "M14", n: "Maitreya Phowa", f: "1000 Maitreya Phowa.pdf" }
          - { m: "M15", n: "Maitreya Samaya", f: "1000 Maitreya Samaya.pdf" }
          - { m: "M16", n: "Maitreya Shambhala-Chakra", f: "1000 Maitreya Shambhala-Chakra.pdf" }

    steps:
      - name: 1. Acceso al Repositorio
        uses: actions/checkout@v4

      - name: 2. Setup de Herramientas de Compresión
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: 3. Localización y Verificación de la Semilla
        id: locate
        run: |
          FILE_PATH=$(find . -maxdepth 1 -iname "${{ matrix.f }}" -print -quit)
          if [ -z "$FILE_PATH" ]; then
            echo "❌ ERROR: Archivo semilla '${{ matrix.f }}' no encontrado."
            exit 1
          fi
          7z a -t7z "current.7z" "$FILE_PATH" -mx=9 -ms=on > /dev/null

      - name: 4. Motor de Expansión Fractal (333 Ciclos)
        run: |
          set -e
          cat << 'EOF' > cloner.py
          import os
          os.makedirs("buffer", exist_ok=True)
          for i in range(1, 1001):
              os.link("current.7z", f"buffer/node_{i}.7z")
          EOF

          # 333 ciclos x 3 órdenes de magnitud = 999 (+ base)
          for step in $(seq 1 333)
          do
            echo ">>> [FIRMWARE KERNEL] ${{ matrix.m }} - ${{ matrix.n }} | Ciclo $step/333"
            python3 cloner.py
            cd buffer
            7z a -t7z "../next.7z" . -mx=9 -ms=on -m0=lzma2 -mmt=2 -bso0 -bsp0
            cd ..
            rm -rf buffer && rm "current.7z" && mv "next.7z" "current.7z"
          done
          # Renombrado final inmaculado
          mv "current.7z" "${{ matrix.m }} 10^999 ${{ matrix.n }}.7z"

      - name: 5. Sellado y Carga del Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Firmware_${{ matrix.m }}_${{ matrix.n }}
          path: "${{ matrix.m }} 10^999 ${{ matrix.n }}.7z"
