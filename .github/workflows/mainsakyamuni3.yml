name: Firmware Modulos M33-M49 (10^999)

on: [workflow_dispatch]

jobs:
  compilacion_firmware_avanzado:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { m: "M33", n: "Sarvavid Vairochana", f: "1000 Sarvavid Vairochana.pdf" }
          - { m: "M34", n: "Shakyaraja", f: "1000 Shakyaraja.pdf" }
          - { m: "M35", n: "Shakyasimha", f: "1000 Shakyasimha.pdf" }
          - { m: "M36", n: "Sitavati", f: "1000 Sitavati.pdf" }
          - { m: "M37", n: "Trailokyavijaya Shakyamuni", f: "1000 Trailokyavijaya Shakyamuni.pdf" }
          - { m: "M38", n: "Ushnisha Sitatapatra", f: "1000 Ushnisha Sitatapatra.pdf" }
          - { m: "M39", n: "Vajradanda", f: "1000 Vajradanda.pdf" }
          - { m: "M40", n: "Vajradhara", f: "1000 Vajradhara.pdf" }
          - { m: "M41", n: "Vajradhatu Mahavairochana", f: "1000 Vajradhatu Mahavairochana.pdf" }
          - { m: "M42", n: "Vajrapani Bhutadamara", f: "1000 Vajrapani Bhutadamara.pdf" }
          - { m: "M43", n: "Vajrasana", f: "1000 Vajrasana.pdf" }
          - { m: "M44", n: "Vidyarajni Mahachanda", f: "1000 Vidyarajni Mahachanda.pdf" }
          - { m: "M45", n: "Muni of the Animals", f: "Muni of the Animals.pdf" }
          - { m: "M46", n: "Muni of the Asuras", f: "Muni of the Asuras.pdf" }
          - { m: "M47", n: "Muni of the Humans", f: "Muni of the Humans.pdf" }
          - { m: "M48", n: "Muni of the Pretas", f: "Muni of the Pretas.pdf" }
          - { m: "M49", n: "Vajrachhedika Shakyamuni", f: "Vajrachhedika Shakyamuni.pdf" }

    steps:
      - name: 1. Acceso al Repositorio
        uses: actions/checkout@v4

      - name: 2. Setup de Herramientas de Compresión
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: 3. Localización y Verificación de la Semilla
        id: locate
        run: |
          FILE_PATH=$(find . -maxdepth 1 -iname "${{ matrix.f }}" -print -quit)
          if [ -z "$FILE_PATH" ]; then
            echo "❌ ERROR: Archivo semilla '${{ matrix.f }}' no encontrado."
            exit 1
          fi
          7z a -t7z "current.7z" "$FILE_PATH" -mx=9 -ms=on > /dev/null

      - name: 4. Motor de Expansión Fractal (333 Ciclos)
        run: |
          set -e
          cat << 'EOF' > cloner.py
          import os
          os.makedirs("buffer", exist_ok=True)
          for i in range(1, 1001):
              os.link("current.7z", f"buffer/node_{i}.7z")
          EOF

          for step in $(seq 1 333)
          do
            echo ">>> [FIRMWARE KERNEL] ${{ matrix.m }} - ${{ matrix.n }} | Ciclo $step/333"
            python3 cloner.py
            cd buffer
            7z a -t7z "../next.7z" . -mx=9 -ms=on -m0=lzma2 -mmt=2 -bso0 -bsp0
            cd ..
            rm -rf buffer && rm "current.7z" && mv "next.7z" "current.7z"
          done
          
          mv "current.7z" "${{ matrix.m }} 10^999 ${{ matrix.n }}.7z"

      - name: 5. Sellado y Carga del Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Firmware_${{ matrix.m }}_${{ matrix.n }}
          path: "${{ matrix.m }} 10^999 ${{ matrix.n }}.7z"
