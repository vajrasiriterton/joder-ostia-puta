name: Amritayana - Gurus Tanda 2 (Especial)

on: [workflow_dispatch]

jobs:
  ascensao_fractal:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { n: "84 Siddhas", f: "1000 84 Siddhas.pdf", e: "Especial", b: 3, s: 332 }
          - { n: "Atisha Dipamkara", f: "1000 Atisha Dipamkara.pdf", e: "Especial", b: 3, s: 332 }
          - { n: "Dilgo Khyentse Rinpoche", f: "1000 Dilgo Khyentse Rinpoche.pdf", e: "Especial", b: 3, s: 332 }
          - { n: "Jamgon Kongtrul", f: "1000 Jamgön Kongtrul Lodrö Thaye.pdf", e: "Especial", b: 3, s: 332 }
          - { n: "Jamyang Khyentse Wangpo", f: "1000 Jamyang Khyentse Wangpo.pdf", e: "Especial", b: 3, s: 332 }
          - { n: "Kunkyen Dolpopa", f: "1000 Kunkyen Dolpopa.pdf", e: "Especial", b: 3, s: 332 }
          - { n: "Machig Labdron", f: "1000 Machig Labdrön.pdf", e: "Especial", b: 3, s: 332 }
          - { n: "Nagarjuna", f: "1000 Nagarjuna.pdf", e: "Especial", b: 3, s: 332 }
          - { n: "Niguma", f: "1000 Niguma.pdf", e: "Especial", b: 3, s: 332 }
          - { n: "Padampa Sangye", f: "1000 Padampa Sangye.pdf", e: "Especial", b: 3, s: 332 }
          - { n: "Samaya Mantras", f: "1000 Samaya Mantras.pdf", e: "Especial", b: 3, s: 332 }
          - { n: "Saraha", f: "1000 Saraha.pdf", e: "Especial", b: 3, s: 332 }
          - { n: "Sukhasiddhi", f: "1000 Sukhasiddhi.pdf", e: "Especial", b: 3, s: 332 }
          - { n: "Tonpa Shenrab", f: "1000 Tonpa Shenrab.pdf", e: "Especial", b: 3, s: 332 }
          - { n: "Universal Guru Yoga", f: "1000 Universal Guru Yoga.pdf", e: "Especial", b: 3, s: 332 }
          - { n: "Ye Dharma Hetu", f: "1000 Ye Dharma Hetu.pdf", e: "Especial", b: 3, s: 332 }

    steps:
      - name: 1. Acesso ao Repositório Amritayana
        uses: actions/checkout@v4

      - name: 2. Setup de Ferramentas
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: 3. Localização de Semilla
        id: locate
        run: |
          FILE_PATH=$(find . -maxdepth 1 -iname "${{ matrix.f }}" -print -quit)
          if [ -z "$FILE_PATH" ]; then
            echo "❌ Archivo semilla no encontrado."
            exit 1
          fi
          7z a -t7z "current.7z" "$FILE_PATH" -mx=9 -ms=on > /dev/null

      - name: 4. Motor de Expansão 10^999
        run: |
          set -e
          cat << 'EOF' > cloner.py
          import os
          os.makedirs("buffer", exist_ok=True)
          for i in range(1, 1001):
              os.link("current.7z", f"buffer/node_{i}.7z")
          EOF

          for step in $(seq 1 ${{ matrix.s }})
          do
            EXP=$(( ${{ matrix.b }} + step * 3 ))
            echo ">>> [AMRITAYANA] ${{ matrix.n }} | Ciclo $step/${{ matrix.s }} | Potencia: 10^$EXP"
            python3 cloner.py
            cd buffer
            7z a -t7z "../next.7z" . -mx=9 -ms=on -m0=lzma2 -mmt=2 -bso0 -bsp0
            cd ..
            rm -rf buffer && rm "current.7z" && mv "next.7z" "current.7z"
          done
          mv "current.7z" "10^999 ${{ matrix.e }} ${{ matrix.n }}.7z"

      - name: 5. Armazenamento
        uses: actions/upload-artifact@v4
        with:
          name: Ascension_999_${{ matrix.n }}
          path: "10^999 ${{ matrix.e }} ${{ matrix.n }}.7z"
