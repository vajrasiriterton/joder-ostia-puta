name: Firmware Modulos M17-M32 + Anusarini (10^999)

on: [workflow_dispatch]

jobs:
  compilacion_firmware_avanzado:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { m: "M17", n: "Muni Amitabha-Raja", f: "1000 Muni Amitabha-Raja.pdf" }
          - { m: "M18", n: "Muni Dundubhisvara", f: "1000 Muni Dundubhisvara.pdf" }
          - { m: "M19", n: "Muni Guhyapati", f: "1000 Muni Guhyapati.pdf" }
          - { m: "M20", n: "Muni Jnanabhaskara", f: "1000 Muni Jnanabhaskara.pdf" }
          - { m: "M21", n: "Muni Jnanadaka", f: "1000 Muni Jnanadaka.pdf" }
          - { m: "M22", n: "Muni Marici", f: "1000 Muni Marici.pdf" }
          - { m: "M23", n: "Muni Nagesvara Raja", f: "1000 Muni Nagesvara Raja.pdf" }
          - { m: "M24", n: "Muni of the Devas", f: "1000 Muni of the Devas.pdf" }
          - { m: "M25", n: "Muni Ratnaketu", f: "1000 Muni Ratnaketu.pdf" }
          - { m: "M26", n: "Muni Trisamaya Vajra", f: "1000 Muni Trisamaya Vajra.pdf" }
          - { m: "M27", n: "Muni Vajrachitta", f: "1000 Muni Vajrachitta.pdf" }
          - { m: "M28", n: "Muni-Amitabha-Raja 2", f: "1000 Muni-Amitabha-Raja.pdf" }
          - { m: "M29", n: "Paramadya Kalachakra", f: "1000 Paramadya Kalachakra.pdf" }
          - { m: "M30", n: "Pramardani", f: "1000 Pramardani.pdf" }
          - { m: "M31", n: "Sarvathasiddhi DOCX", f: "1000 Sarvathasiddhi.docx" }
          - { m: "M32", n: "Sarvathasiddhi PDF", f: "1000 Sarvathasiddhi.pdf" }
          - { m: "M50", n: "Anusarini", f: "1000 Anusarini.pdf" }

    steps:
      - name: 1. Acceso al Repositorio
        uses: actions/checkout@v4

      - name: 2. Setup de Herramientas de Compresión
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: 3. Localización y Verificación de la Semilla
        id: locate
        run: |
          FILE_PATH=$(find . -maxdepth 1 -iname "${{ matrix.f }}" -print -quit)
          if [ -z "$FILE_PATH" ]; then
            echo "❌ ERROR: Archivo semilla '${{ matrix.f }}' no encontrado."
            exit 1
          fi
          7z a -t7z "current.7z" "$FILE_PATH" -mx=9 -ms=on > /dev/null

      - name: 4. Motor de Expansión Fractal (333 Ciclos)
        run: |
          set -e
          cat << 'EOF' > cloner.py
          import os
          os.makedirs("buffer", exist_ok=True)
          for i in range(1, 1001):
              os.link("current.7z", f"buffer/node_{i}.7z")
          EOF

          for step in $(seq 1 333)
          do
            echo ">>> [FIRMWARE KERNEL] ${{ matrix.m }} - ${{ matrix.n }} | Ciclo $step/333"
            python3 cloner.py
            cd buffer
            7z a -t7z "../next.7z" . -mx=9 -ms=on -m0=lzma2 -mmt=2 -bso0 -bsp0
            cd ..
            rm -rf buffer && rm "current.7z" && mv "next.7z" "current.7z"
          done
          
          mv "current.7z" "${{ matrix.m }} 10^999 ${{ matrix.n }}.7z"

      - name: 5. Sellado y Carga del Artefacto
        uses: actions/upload-artifact@v4
        with:
          name: Firmware_${{ matrix.m }}_${{ matrix.n }}
          path: "${{ matrix.m }} 10^999 ${{ matrix.n }}.7z"
